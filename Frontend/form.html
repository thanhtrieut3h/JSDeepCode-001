<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>HTML Form</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <form method="" action="" enctype="multipart/form-data">
            <label for="username">Username</label>
            <input type="text" id="username" required maxlength="10" />
            <br/><br/>
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="3" />
            <br/><br/>
            <label for="email">Email</label>
            <input type="email" id="email" readonly value="test@gmail.com" />
            <br/><br/>
            <label for="file">File</label>
            <input type="file" id="file" disabled />
            <br/><br/>
            <label for="number">Number</label>
            <input type="number" id="number" />
            <br/><br/>
            <label for="url">URL</label>
            <input type="url" id="url" />
            <br/><br/>
            <label for="color">Color</label>
            <input type="color" id="color" />
            <br/><br/>
            <label for="date">Date/Week/Month</label>
            <input type="date" id="date" />
            <br/><br/>
            <label for="des">Description</label>
            <textarea id="des" rows="8"></textarea>
            <br/><br/>
            <label for="gender">Choose gender</label>
            <select id="gender">
                <option value=""> --- choose ---</option>
                <option value="0"> Female</option>
                <option value="1" selected> Male</option>
                <option value="2"> Options</option>
            </select>
            <br/><br/>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" />
            <label for="css">CSS</label>
            <input type="checkbox" id="css" />
            <label for="js">JS</label>
            <input type="checkbox" id="js" checked />
            <br/><br/>
            <label for="age1"> 20 - 25</label>
            <input type="radio" id="age1" name="age" checked />
            <label for="age2"> 26 - 30</label>
            <input type="radio" id="age2" name="age" />
            <label for="age3"> 31 - 35</label>
            <input type="radio" id="age3" name="age" />
            <br/><br/>
            <button type="submit"> Submit</button>
            <br/><br/>
            <button type="button"> Button</button>
        </form>
    </body>
</html>
